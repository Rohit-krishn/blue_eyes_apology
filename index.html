<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
  background: radial-gradient(circle at center, #ffdce5, #f8bbd0);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  transition:1s;
}

/* DARK MODE (sad ending) */
body.sad-mode{
  background: radial-gradient(circle at center, #444, #111);
}

/* SCENE */
#scene{
  text-align:center;
  position:relative;
  z-index:10;
}

/* BUBBLE */
#bubble{
  opacity:0;
  background:white;
  padding:16px 26px;
  border-radius:22px;
  margin-bottom:20px;
  font-size:1.2rem;
  max-width:300px;
  min-height:50px;
}

/* AVATAR */
#avatar{
  transition:0.4s;
}

/* HEAD */
#head{
  width:160px;
  height:160px;
  border-radius:50%;
  overflow:hidden;

  background-image:url("Rohit.jpeg");
  background-size:260%;
  background-position:55% 25%;

  border:5px solid white;

  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  transition:0.3s;

  animation:idle 5s infinite ease-in-out;
}

#head.sad{
  background-image:url("Rohit_sad.jpeg");
  filter: grayscale(30%) brightness(0.8);
}

/* IDLE */
@keyframes idle{
  0%,100%{transform:rotate(0deg);}
  50%{transform:rotate(2deg);}
}

/* BODY */
#body{
  width:170px;
  height:95px;
  background:#2f2f2f;
  border-radius:30px;
  margin:auto;
  margin-top:-25px;
}

/* UI */
#ui{
  margin-top:25px;
  opacity:0;
  pointer-events:none;
  transition:0.5s;
}
#ui.active{
  opacity:1;
  pointer-events:auto;
}

button{
  padding:12px 22px;
  border:none;
  border-radius:50px;
  margin:5px;
  cursor:pointer;
}

/* ANIMATIONS */
.head-slap{ animation:slap 0.4s; }
@keyframes slap{
  30%{transform:rotate(-25deg);}
  60%{transform:rotate(20deg);}
}

.head-kiss{ animation:kiss 0.4s; }
@keyframes kiss{
  50%{transform:scale(1.2);}
}

.glow{
  box-shadow:0 0 40px #ff4081;
}

/* HEARTS */
.heart{
  position:absolute;
  font-size:22px;
  animation:rise 1.2s forwards;
}
@keyframes rise{
  to{opacity:0; transform:translateY(-140px);}
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div id="scene">

<div id="bubble"></div>

<div id="avatar">
  <div id="head"></div>
  <div id="body"></div>
</div>

<div id="ui">
  <button id="slap">👋 Slap</button>
  <button id="kiss">💋 Kiss</button>
</div>

</div>

<script>

/* ELEMENTS */
const bubble = document.getElementById("bubble");
const head = document.getElementById("head");
const ui = document.getElementById("ui");
const music = document.getElementById("music");

let slaps=0, kisses=0, active=false, musicStarted=false;

/* TYPEWRITER */
function typeText(text, speed=40){
  bubble.innerText="";
  bubble.style.opacity=1;
  let i=0;
  let interval=setInterval(()=>{
    bubble.innerText += text[i];
    i++;
    if(i>=text.length) clearInterval(interval);
  }, speed);
}

/* MUSIC */
function startMusic(){
  if(!musicStarted){
    music.volume=0;
    music.play().catch(()=>{});
    musicStarted=true;

    let v=0;
    let fade=setInterval(()=>{
      if(v>=0.4){ clearInterval(fade);}
      else{ v+=0.02; music.volume=v;}
    },200);
  }
}

/* STORY */
setTimeout(()=>typeText("I didn’t handle things right..."),1000);
setTimeout(()=>typeText("And I know I hurt you."),4000);
setTimeout(()=>typeText("You don’t have to forgive me..."),7000);
setTimeout(()=>typeText("But I wanted to try..."),10000);
setTimeout(()=>{
  typeText("React however you feel.");
  ui.classList.add("active");
  active=true;
},13000);

/* ACTIONS */
function slap(){
  startMusic();

  if(!active){
    typeText("Wait… please listen first.");
    return;
  }

  slaps++;
  head.classList.add("head-slap","sad");
  setTimeout(()=>head.classList.remove("head-slap"),400);

  if(slaps<3) typeText("...yeah, I deserve that.");
  else typeText("I really messed up, didn’t I?");

  checkEnd();
}

function kiss(){
  startMusic();

  if(!active){
    typeText("Wait… please listen first.");
    return;
  }

  kisses++;
  head.classList.add("head-kiss");
  head.classList.remove("sad");
  setTimeout(()=>head.classList.remove("head-kiss"),400);

  spawnHearts();

  if(kisses<3) typeText("You’re kinder than I deserve...");
  else typeText("Why are you so good to me? 💖");

  checkEnd();
}

/* HEARTS */
function spawnHearts(){
  for(let i=0;i<5;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerText="💖";
    h.style.left=(window.innerWidth/2 + Math.random()*100-50)+"px";
    h.style.top=(window.innerHeight/2)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1200);
  }
}

/* ENDING */
function checkEnd(){
  if(slaps>=6 || kisses>=6){
    active=false;
    ui.style.opacity=0;

    setTimeout(()=>{
      if(kisses>slaps){
        typeText("I love you ❤️");
        head.classList.add("glow");
        spawnHearts();
      } else {
        typeText("I’ll fix myself… I promise.");
        document.body.classList.add("sad-mode");
      }
    },1000);
  }
}

/* EVENTS */
document.getElementById("slap").onclick=slap;
document.getElementById("kiss").onclick=kiss;

document.body.addEventListener("click",(e)=>{
  if(e.target.tagName!=="BUTTON") slap();
});

</script>

</body>
</html>
