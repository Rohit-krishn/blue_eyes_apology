<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
  background: radial-gradient(circle at center, #ffdce5, #f8bbd0);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  transition:1s;
}

body.sad-mode{
  background: radial-gradient(circle at center, #444, #111);
}

#scene{
  text-align:center;
}

/* BUBBLE */
#bubble{
  opacity:0;
  background:white;
  padding:16px 26px;
  border-radius:22px;
  margin-bottom:20px;
  font-size:1.2rem;
  max-width:320px;
  min-height:60px;
  line-height:1.5;
  letter-spacing:0.3px;
}

/* HEAD */
#head{
  width:170px;
  height:170px;
  border-radius:50%;
  overflow:hidden;

  /* HAPPY FACE (CROPPED) */
  background-image:url("Rohit.jpeg");
  background-size:260%;
  background-position:55% 25%;

  border:5px solid white;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);

  animation:idle 5s infinite ease-in-out;
}

/* SAD FACE (FULL IMAGE, NO CROP) */
#head.sad{
  background-image:url("Rohit_sad.jpeg");
  background-size:cover;     /* FULL FACE */
  background-position:center;
  filter: grayscale(20%) brightness(0.9);
}

@keyframes idle{
  0%,100%{transform:rotate(0deg);}
  50%{transform:rotate(2deg);}
}

/* BODY */
#body{
  width:180px;
  height:100px;
  background:#2f2f2f;
  border-radius:30px;
  margin:auto;
  margin-top:-30px;
}

/* UI */
#ui{
  margin-top:25px;
  opacity:0;
  pointer-events:none;
  transition:0.5s;
}
#ui.active{
  opacity:1;
  pointer-events:auto;
}

button{
  padding:12px 22px;
  border:none;
  border-radius:50px;
  margin:5px;
  cursor:pointer;
}

/* ANIMATIONS */
.head-slap{ animation:slap 0.4s; }
@keyframes slap{
  30%{transform:rotate(-25deg);}
  60%{transform:rotate(20deg);}
}

.head-kiss{ animation:kiss 0.4s; }
@keyframes kiss{
  50%{transform:scale(1.15);}
}

.glow{
  box-shadow:0 0 40px #ff4081;
}

/* HEARTS */
.heart{
  position:absolute;
  font-size:22px;
  animation:rise 1.2s forwards;
}
@keyframes rise{
  to{opacity:0; transform:translateY(-140px);}
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div id="scene">

<div id="bubble"></div>

<div id="avatar">
  <div id="head"></div>
  <div id="body"></div>
</div>

<div id="ui">
  <button id="slap">👋 Slap</button>
  <button id="kiss">💋 Kiss</button>
</div>

</div>

<script>

const bubble = document.getElementById("bubble");
const head = document.getElementById("head");
const ui = document.getElementById("ui");
const music = document.getElementById("music");

let slaps=0, kisses=0, active=false;
let musicStarted=false;
let typingTimer=null;

/* FIXED TYPEWRITER (WITH SPACE FIX) */
function typeText(text, speed=35){
  clearInterval(typingTimer);
  bubble.innerText="";
  bubble.style.opacity=1;

  let i=0;
  typingTimer=setInterval(()=>{
    bubble.innerText += text.charAt(i);  // FIXED
    i++;
    if(i>=text.length){
      clearInterval(typingTimer);
    }
  }, speed);
}

/* PERFECT MUSIC UNLOCK */
function unlockMusic(){
  if(musicStarted) return;

  musicStarted = true;

  const playAudio = () => {
    music.volume = 0;
    let playPromise = music.play();

    if(playPromise !== undefined){
      playPromise.then(()=>{
        let v=0;
        let fade=setInterval(()=>{
          if(v>=0.4){
            clearInterval(fade);
          } else {
            v+=0.02;
            music.volume=v;
          }
        },200);
      }).catch(()=>{});
    }
  };

  playAudio();
}

/* STORY */
async function story(){
  await delay(1000);
  typeText("I didn’t handle things right...");

  await delay(3000);
  typeText("And I know I hurt you.");

  await delay(3000);
  typeText("You don’t have to forgive me...");

  await delay(3000);
  typeText("But I wanted to try...");

  await delay(3000);
  typeText("React however you feel.");

  ui.classList.add("active");
  active=true;
}

function delay(ms){
  return new Promise(r=>setTimeout(r,ms));
}

story();

/* ACTIONS */
function slap(e){
  e?.stopPropagation();
  unlockMusic();

  if(!active){
    typeText("Wait… please listen first.");
    return;
  }

  slaps++;

  head.classList.remove("head-kiss");
  head.classList.add("head-slap","sad");

  setTimeout(()=>head.classList.remove("head-slap"),400);

  if(slaps<3){
    typeText("...yeah, I deserve that.");
  } else {
    typeText("I really messed up, didn’t I?");
  }

  checkEnd();
}

function kiss(e){
  e?.stopPropagation();
  unlockMusic();

  if(!active){
    typeText("Wait… please listen first.");
    return;
  }

  kisses++;

  head.classList.remove("head-slap","sad");
  head.classList.add("head-kiss");

  setTimeout(()=>head.classList.remove("head-kiss"),400);

  spawnHearts();

  if(kisses<3){
    typeText("You’re kinder than I deserve...");
  } else {
    typeText("Why are you so good to me? 💖");
  }

  checkEnd();
}

/* HEARTS */
function spawnHearts(){
  for(let i=0;i<5;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerText="💖";

    h.style.left=(window.innerWidth/2 + Math.random()*120-60)+"px";
    h.style.top=(window.innerHeight/2)+"px";

    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1200);
  }
}

/* ENDING */
function checkEnd(){
  if(slaps>=6 || kisses>=6){
    active=false;
    ui.style.opacity=0;

    setTimeout(()=>{
      if(kisses>slaps){
        typeText("I love you ❤️");
        head.classList.remove("sad");
        head.classList.add("glow");
        spawnHearts();
      } else {
        typeText("I’ll fix myself… I promise.");
        document.body.classList.add("sad-mode");
      }
    },1000);
  }
}

/* EVENTS */
document.getElementById("slap").addEventListener("click", slap);
document.getElementById("kiss").addEventListener("click", kiss);

/* GLOBAL CLICK = ALSO UNLOCK MUSIC */
document.body.addEventListener("click",(e)=>{
  if(e.target.tagName!=="BUTTON"){
    slap(e);
  }
});

</script>

</body>
</html>
