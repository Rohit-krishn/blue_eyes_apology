<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Apology</title>

<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: #fce4ec;
  font-family: 'Segoe UI';
  overflow: hidden;
}

#scene {
  position: relative;
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* SPEECH */
#bubble {
  opacity: 0;
  background: white;
  padding: 15px 25px;
  border-radius: 20px;
  font-weight: bold;
  transition: 0.5s;
  margin-bottom: 20px;
}

/* CHARACTER */
#character-container {
  position: relative;
  transition: 1s;
}

#character {
  position: relative;
  width: 140px;
  height: 200px;
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: breathe 3s infinite ease-in-out;
}

/* HEAD */
.head {
  width: 90px;
  height: 90px;
  background: #d6a77a; /* 🔥 CHANGE SKIN */
  border-radius: 50%;
  position: relative;
}

/* HAIR */
.hair {
  position: absolute;
  top: -10px;
  width: 100%;
  height: 50px;
  background: black; /* 🔥 CHANGE HAIR */
  border-radius: 50% 50% 0 0;
}

/* EYES */
.eyes {
  position: absolute;
  top: 30px;
  width: 100%;
  display: flex;
  justify-content: space-around;
}

.eye {
  width: 10px;
  height: 10px;
  background: black;
  border-radius: 50%;
  animation: blink 4s infinite;
}

/* MOUTH */
.mouth {
  position: absolute;
  bottom: 18px;
  left: 50%;
  width: 25px;
  height: 10px;
  border-bottom: 3px solid black;
  transform: translateX(-50%);
}

/* BEARD */
.beard {
  position: absolute;
  bottom: 5px;
  width: 60%;
  height: 20px;
  background: #3e2723; /* 🔥 CHANGE BEARD */
  border-radius: 50%;
}

/* BODY */
.body {
  width: 80px;
  height: 90px;
  background: #90caf9;
  border-radius: 20px;
  margin-top: -10px;
}

/* CHAIR */
#chair {
  font-size: 100px;
  position: absolute;
  bottom: -40px;
  opacity: 0;
  transition: 1s;
}

/* UI */
#ui {
  opacity: 0;
  pointer-events: none;
  margin-top: 50px;
  text-align: center;
  transition: 0.5s;
}

#ui.active {
  opacity: 1;
  pointer-events: auto;
}

button {
  padding: 12px 20px;
  border-radius: 50px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  margin: 5px;
}

#btn-slap { background: orange; }
#btn-kiss { background: pink; }

/* ANIMATIONS */
@keyframes blink {
  0%, 90%, 100% { height: 10px; }
  95% { height: 2px; }
}

@keyframes breathe {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

.slapped {
  animation: slap 0.4s;
}

@keyframes slap {
  0% { transform: translateX(0); }
  25% { transform: translateX(-20px) rotate(-8deg); }
  50% { transform: translateX(20px) rotate(8deg); }
  100% { transform: translateX(0); }
}

.kissed {
  animation: kiss 0.5s;
}

@keyframes kiss {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

/* HEARTS */
.kissed::after {
  content: "❤️ ❤️ ❤️";
  position: absolute;
  top: -30px;
  font-size: 18px;
  animation: float 1s forwards;
}

@keyframes float {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-40px); }
}

/* STATES */
.bowing { transform: rotate(-20deg); }
.sitting { transform: translateY(60px); }

#tap-zone {
  position: absolute;
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>

<div id="tap-zone"></div>

<div id="scene">

<div id="bubble">I'm really sorry for yesterday</div>

<div id="character-container">
  <div id="character">
    <div class="head">
      <div class="hair"></div>
      <div class="eyes">
        <div class="eye"></div>
        <div class="eye"></div>
      </div>
      <div class="mouth"></div>
      <div class="beard"></div>
    </div>
    <div class="body"></div>
  </div>
  <div id="chair">🪑</div>
</div>

<div id="ui">
  <div>
    Slaps: <span id="count-slap">0</span> |
    Kisses: <span id="count-kiss">0</span>
  </div>
  <button id="btn-slap">👋 Slap</button>
  <button id="btn-kiss">💋 Kiss</button>
</div>

</div>

<script>
let slaps = 0, kisses = 0;
const max = 10;
let phase = 'intro';

const bubble = document.getElementById('bubble');
const charContainer = document.getElementById('character-container');
const character = document.getElementById('character');
const chair = document.getElementById('chair');
const ui = document.getElementById('ui');

setTimeout(()=>{
  charContainer.classList.add('bowing');
  bubble.style.opacity = 1;

  setTimeout(()=>{
    charContainer.classList.remove('bowing');
    charContainer.classList.add('sitting');
    bubble.style.opacity = 0;
    chair.style.opacity = 1;

    setTimeout(()=>{
      ui.classList.add('active');
      phase='interaction';
    },1000);

  },3000);
},500);

function slap(){
  if(phase!=='interaction') return;
  slaps++;
  document.getElementById('count-slap').innerText=slaps;
  animate('slapped');
  check();
}

function kiss(){
  if(phase!=='interaction') return;
  kisses++;
  document.getElementById('count-kiss').innerText=kisses;
  animate('kissed');
  check();
}

function animate(cls){
  character.classList.remove('slapped','kissed');
  void character.offsetWidth;
  character.classList.add(cls);
}

function check(){
  if(slaps>=max || kisses>=max){
    phase='end';
    ui.classList.remove('active');

    setTimeout(()=>{
      charContainer.classList.remove('sitting');
      chair.style.opacity=0;
      bubble.innerText="I love u ❤️";
      bubble.style.opacity=1;
    },500);
  }
}

document.getElementById('btn-slap').onclick=slap;
document.getElementById('btn-kiss').onclick=kiss;
document.getElementById('tap-zone').onclick=slap;
</script>

</body>
</html>
