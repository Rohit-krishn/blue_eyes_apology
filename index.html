<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
  background: linear-gradient(135deg,#fce4ec,#f8bbd0);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Tap zone */
#tap-zone{
  position:absolute;
  width:100%;
  height:100%;
  z-index:1;
}

/* Scene */
#scene{
  text-align:center;
  z-index:10;
}

/* Dialogue bubble */
#bubble{
  opacity:0;
  background:white;
  padding:15px 25px;
  border-radius:20px;
  margin-bottom:20px;
  font-size:1.2rem;
  transition:0.5s;
}

/* Avatar */
#avatar{
  position:relative;
  width:180px;
  margin:auto;
  animation:float 3s infinite ease-in-out;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* HEAD */
#head{
  width:120px;
  height:120px;
  background:#ffccbc;
  border-radius:50%;
  margin:auto;
  position:relative;
  transition:0.2s;
}

/* Hair */
#hair{
  position:absolute;
  width:130px;
  height:70px;
  background:#222;
  border-radius:70px 70px 0 0;
  top:-10px;
  left:-5px;
}

/* Eyes */
.eye{
  width:12px;
  height:12px;
  background:#000;
  border-radius:50%;
  position:absolute;
  top:45px;
}
#eye1{ left:35px;}
#eye2{ right:35px;}

/* Smile */
#mouth{
  position:absolute;
  width:40px;
  height:20px;
  border-bottom:4px solid #000;
  border-radius:0 0 40px 40px;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
}

/* BODY */
#body{
  width:140px;
  height:90px;
  background:#333;
  border-radius:30px;
  margin:auto;
  margin-top:-20px;
}

/* Buttons */
#ui{
  margin-top:30px;
  opacity:0;
  pointer-events:none;
  transition:0.5s;
}

#ui.active{
  opacity:1;
  pointer-events:auto;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:50px;
  font-size:1rem;
  margin:5px;
  cursor:pointer;
}

#slap{background:#ffccbc;}
#kiss{background:#f48fb1;}

/* HEAD ANIMATIONS */
.head-slap{
  animation:slap 0.4s;
}
@keyframes slap{
  0%{transform:rotate(0);}
  30%{transform:rotate(-20deg);}
  60%{transform:rotate(15deg);}
  100%{transform:rotate(0);}
}

.head-kiss{
  animation:kiss 0.4s;
}
@keyframes kiss{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

/* Hearts */
.heart{
  position:absolute;
  font-size:20px;
  animation:rise 1s forwards;
}
@keyframes rise{
  0%{opacity:1; transform:translateY(0);}
  100%{opacity:0; transform:translateY(-100px);}
}

/* Glow ending */
.glow{
  box-shadow:0 0 30px #ff4081;
}

</style>
</head>

<body>

<div id="tap-zone"></div>

<div id="scene">

  <div id="bubble">Hey... can we talk?</div>

  <div id="avatar">
    <div id="head">
      <div id="hair"></div>
      <div id="eye1" class="eye"></div>
      <div id="eye2" class="eye"></div>
      <div id="mouth"></div>
    </div>
    <div id="body"></div>
  </div>

  <div id="ui">
    <button id="slap">👋 Slap</button>
    <button id="kiss">💋 Kiss</button>
  </div>

</div>

<script>

let slaps=0, kisses=0;
let max=8;
let active=false;

const bubble=document.getElementById("bubble");
const head=document.getElementById("head");
const ui=document.getElementById("ui");

/* INTRO */
setTimeout(()=>{
  bubble.innerText="I'm really sorry...";
  bubble.style.opacity=1;
},1000);

setTimeout(()=>{
  bubble.innerText="I messed up... didn't I?";
},2500);

setTimeout(()=>{
  ui.classList.add("active");
  active=true;
},3500);

/* ACTIONS */
function slap(){
  if(!active) return;
  slaps++;
  animate("slap");
  bubble.innerText="Yeah... I deserved that 😔";
  bubble.style.opacity=1;
  checkEnd();
}

function kiss(){
  if(!active) return;
  kisses++;
  animate("kiss");
  bubble.innerText="That means a lot... 💖";
  spawnHearts();
  checkEnd();
}

function animate(type){
  head.classList.remove("head-slap","head-kiss");
  void head.offsetWidth;
  head.classList.add(type==="slap"?"head-slap":"head-kiss");
}

/* HEARTS */
function spawnHearts(){
  for(let i=0;i<4;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerText="💖";
    h.style.left=(window.innerWidth/2 + Math.random()*60-30)+"px";
    h.style.top=(window.innerHeight/2)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1000);
  }
}

/* ENDING */
function checkEnd(){
  if(slaps>=max || kisses>=max){
    active=false;
    ui.style.opacity=0;

    setTimeout(()=>{
      if(kisses>slaps){
        bubble.innerText="I love you ❤️";
        head.classList.add("glow");
        spawnHearts();
        setTimeout(spawnHearts,400);
      }else{
        bubble.innerText="I'll try to be better... I promise.";
      }
    },1000);
  }
}

/* EVENTS */
document.getElementById("slap").onclick=slap;
document.getElementById("kiss").onclick=kiss;

document.getElementById("tap-zone").onclick=slap;

</script>

</body>
</html>
