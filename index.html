<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>For You ❤️</title>

<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #fce4ec, #f8bbd0);
}

/* Scene */
#scene {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Bubble */
#bubble {
  opacity: 0;
  background: rgba(255,255,255,0.95);
  padding: 18px 28px;
  border-radius: 25px;
  font-size: 1.3rem;
  font-weight: 600;
  color: #444;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  margin-bottom: 25px;
  transition: all 0.6s ease;
  text-align: center;
}

/* Character */
#character-container {
  transition: transform 1s ease;
  position: relative;
}

.bowing { transform: rotate(-15deg) translateY(20px); }
.sitting { transform: translateY(60px); }

/* Avatar (FIXED IMAGE HERE) */
#character {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  background-image: url('my-photo.png.jpeg'); /* ✅ FIXED */
  background-size: cover;
  background-position: center top;
  border: 5px solid white;
  box-shadow: 0 15px 35px rgba(0,0,0,0.3);
  animation: float 3s ease-in-out infinite;
}

/* Floating */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* Chair */
#chair {
  font-size: 100px;
  position: absolute;
  bottom: -40px;
  opacity: 0;
  transition: opacity 1s ease;
}

/* UI */
#ui {
  opacity: 0;
  margin-top: 40px;
  transition: opacity 0.5s ease;
}

#ui.active { opacity: 1; }

button {
  padding: 16px 28px;
  margin: 10px;
  border: none;
  border-radius: 50px;
  font-size: 1.2rem;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

button:active { transform: scale(0.9); }

#btn-slap { background: #ffccbc; }
#btn-kiss { background: #f48fb1; }

/* Animations */
.slap { animation: slapAnim 0.4s ease; }
@keyframes slapAnim {
  0% { transform: translateX(0); }
  30% { transform: translateX(-20px); }
  60% { transform: translateX(15px); }
  100% { transform: translateX(0); }
}

.kiss { animation: kissAnim 0.5s ease; }
@keyframes kissAnim {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

/* Hearts */
.heart {
  position: absolute;
  font-size: 22px;
  animation: rise 1.2s ease forwards;
}
@keyframes rise {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-120px); }
}

/* Glow */
.glow {
  animation: glow 1s ease infinite alternate;
}
@keyframes glow {
  0% { box-shadow: 0 0 10px pink; }
  100% { box-shadow: 0 0 40px #ff4081; }
}
</style>
</head>

<body>

<div id="scene">
  <div id="bubble">Hey… can we talk?</div>

  <div id="character-container">
    <div id="character"></div>
    <div id="chair">🪑</div>
  </div>

  <div id="ui">
    <button id="btn-slap">👋 Slap</button>
    <button id="btn-kiss">💋 Kiss</button>
  </div>
</div>

<script>
let slaps = 0;
let kisses = 0;
const max = 8;

const bubble = document.getElementById("bubble");
const character = document.getElementById("character");
const container = document.getElementById("character-container");
const chair = document.getElementById("chair");
const ui = document.getElementById("ui");

/* Intro */
setTimeout(()=>{
  container.classList.add("bowing");
  bubble.innerText="I'm really sorry...";
  bubble.style.opacity=1;
},1000);

setTimeout(()=>{
  container.classList.remove("bowing");
  container.classList.add("sitting");
  chair.style.opacity=1;
  bubble.innerText="I didn't mean to hurt you ❤️";
},3000);

setTimeout(()=>{
  ui.classList.add("active");
},4500);

/* Actions */
document.getElementById("btn-slap").onclick=()=>{
  slaps++;
  animate("slap");
  bubble.innerText="Okay… I deserve that 😔";
  endCheck();
};

document.getElementById("btn-kiss").onclick=()=>{
  kisses++;
  animate("kiss");
  spawnHearts();
  bubble.innerText="Thank you… that means a lot 💖";
  endCheck();
};

function animate(type){
  character.classList.remove("slap","kiss");
  void character.offsetWidth;
  character.classList.add(type);
}

/* Hearts */
function spawnHearts(){
  for(let i=0;i<4;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerText="💖";
    h.style.left=(window.innerWidth/2 + Math.random()*80-40)+"px";
    h.style.top=(window.innerHeight/2)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1200);
  }
}

/* End */
function endCheck(){
  if(slaps>=max || kisses>=max){
    ui.style.display="none";
    setTimeout(()=>{
      container.classList.remove("sitting");
      chair.style.opacity=0;
      bubble.innerText="I love u ❤️";
      character.classList.add("glow");
      spawnHearts();
    },800);
  }
}
</script>

</body>
</html>
