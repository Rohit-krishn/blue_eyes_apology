<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
  background: radial-gradient(circle at center, #ffdce5, #f8bbd0);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

body::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle, transparent 60%, rgba(0,0,0,0.2));
}

/* tap */
#tap-zone{
  position:absolute;
  width:100%;
  height:100%;
}

/* scene */
#scene{
  text-align:center;
}

/* bubble */
#bubble{
  opacity:0;
  background:white;
  padding:16px 26px;
  border-radius:22px;
  margin-bottom:20px;
  font-size:1.2rem;
  transition:0.5s;
  max-width:300px;
}

/* avatar */
#avatar{
  transition:0.3s;
}

/* HEAD */
#head{
  width:160px;
  height:160px;
  border-radius:50%;
  overflow:hidden;

  background-image:url("Rohit.jpeg");
  background-size:260%;
  background-position:55% 25%;

  border:5px solid white;

  box-shadow:
    0 10px 30px rgba(0,0,0,0.3),
    inset 0 0 20px rgba(255,255,255,0.25);

  filter: contrast(1.15) brightness(1.05) saturate(1.2);

  transition:0.3s;

  animation:idle 5s infinite ease-in-out;
}

/* SAD FACE */
#head.sad{
  background-image:url("Rohit_sad.jpeg");
  background-size:220%;
  background-position:50% 20%;
  filter: grayscale(20%) brightness(0.95);
}

/* idle */
@keyframes idle{
  0%,100%{transform:rotate(0deg) translateY(0);}
  50%{transform:rotate(2deg) translateY(-5px);}
}

/* body */
#body{
  width:170px;
  height:95px;
  background:#2f2f2f;
  border-radius:30px;
  margin:auto;
  margin-top:-25px;
}

/* UI */
#ui{
  margin-top:25px;
  opacity:0;
  pointer-events:none;
  transition:0.5s;
}
#ui.active{
  opacity:1;
  pointer-events:auto;
}

button{
  padding:12px 22px;
  border:none;
  border-radius:50px;
  margin:5px;
  cursor:pointer;
}

/* animations */
.head-slap{
  animation:slap 0.4s;
}
@keyframes slap{
  0%{transform:rotate(0);}
  30%{transform:rotate(-25deg) scale(0.95);}
  60%{transform:rotate(20deg);}
  100%{transform:rotate(0);}
}

.head-kiss{
  animation:kiss 0.4s;
}
@keyframes kiss{
  50%{transform:scale(1.2);}
}

/* shake */
.shake{
  animation:shake 0.3s;
}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-10px);}
  75%{transform:translateX(10px);}
}

/* glow */
.glow{
  box-shadow:0 0 40px #ff4081;
}

/* hearts */
.heart{
  position:absolute;
  font-size:22px;
  animation:rise 1.2s forwards;
}
@keyframes rise{
  0%{opacity:1; transform:translateY(0);}
  100%{opacity:0; transform:translateY(-140px);}
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="bg-music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div id="tap-zone"></div>

<div id="scene">

<div id="bubble">Hey... can we talk?</div>

<div id="avatar">
  <div id="head"></div>
  <div id="body"></div>
</div>

<div id="ui">
  <button id="slap">👋 Slap</button>
  <button id="kiss">💋 Kiss</button>
</div>

</div>

<script>

let slaps=0, kisses=0;
let active=false;

const bubble=document.getElementById("bubble");
const head=document.getElementById("head");
const avatar=document.getElementById("avatar");
const ui=document.getElementById("ui");
const music=document.getElementById("bg-music");

let musicStarted=false;

/* fade in music */
function fadeInMusic(){
  music.volume = 0;
  music.play();
  let v = 0;
  let fade = setInterval(()=>{
    if(v >= 0.4){
      clearInterval(fade);
    } else {
      v += 0.02;
      music.volume = v;
    }
  }, 200);
}

/* STORY */
setTimeout(()=>{
  bubble.innerText="I didn’t handle things right...";
  bubble.style.opacity=1;
},1000);

setTimeout(()=>{
  bubble.innerText="And I know I hurt you.";
},3000);

setTimeout(()=>{
  bubble.innerText="You don’t have to forgive me...";
},5000);

setTimeout(()=>{
  bubble.innerText="But I wanted to try...";
},7000);

setTimeout(()=>{
  bubble.innerText="React however you feel.";
},9000);

setTimeout(()=>{
  ui.classList.add("active");
  active=true;
},10500);

/* ACTIONS */
function slap(){
  if(!active) return;

  if(!musicStarted){
    fadeInMusic();
    musicStarted=true;
  }

  slaps++;

  animate("slap");

  avatar.classList.add("shake");
  setTimeout(()=>avatar.classList.remove("shake"),300);

  head.classList.add("sad");

  bubble.innerText = slaps<3 
    ? "...yeah, I deserve that." 
    : "I really messed up, didn’t I?";

  checkEnd();
}

function kiss(){
  if(!active) return;

  if(!musicStarted){
    fadeInMusic();
    musicStarted=true;
  }

  kisses++;

  animate("kiss");
  spawnHearts();

  head.classList.remove("sad");

  bubble.innerText = kisses<3 
    ? "You’re kinder than I deserve..." 
    : "Why are you so good to me? 💖";

  checkEnd();
}

function animate(type){
  head.classList.remove("head-slap","head-kiss");
  void head.offsetWidth;
  head.classList.add(type==="slap"?"head-slap":"head-kiss");
}

/* hearts */
function spawnHearts(){
  for(let i=0;i<5;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerText="💖";
    h.style.left=(window.innerWidth/2 + Math.random()*100-50)+"px";
    h.style.top=(window.innerHeight/2)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1200);
  }
}

/* ending */
function checkEnd(){
  if(slaps>=6 || kisses>=6){
    active=false;
    ui.style.opacity=0;

    setTimeout(()=>{
      if(kisses>slaps){
        bubble.innerText="I love you ❤️";
        head.classList.remove("sad");
        head.classList.add("glow");

        spawnHearts();
        setTimeout(spawnHearts,300);
        setTimeout(spawnHearts,600);

        avatar.style.transform="scale(1.1)";
      } else {
        bubble.innerText="I’ll fix myself… I promise.";
        head.classList.add("sad");
      }
    },1000);
  }
}

/* events */
document.getElementById("slap").onclick=slap;
document.getElementById("kiss").onclick=kiss;
document.getElementById("tap-zone").onclick=slap;

</script>

</body>
</html>
